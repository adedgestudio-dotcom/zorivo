<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zorivo — Sarrah Bharmal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --card:     #1a1825;
    --border:   #2a2640;
    --purple:   #b8a4ff;
    --cyan:     #47ffe8;
    --white:    #f0f0f0;
    --muted:    #a0a0b0;
    --dim:      #6b6b80;
    --dark-dim: #4e4868;
    --icon-bg:  #1e1b2e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
  }

  /* Background glow */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .bg-glow::before {
    content: '';
    position: absolute; top: -20%; left: -10%; width: 60%; height: 70%;
    background: radial-gradient(ellipse, rgba(184,164,255,0.07) 0%, transparent 65%);
    animation: driftA 12s ease-in-out infinite alternate;
  }
  .bg-glow::after {
    content: '';
    position: absolute; bottom: -10%; right: -10%; width: 50%; height: 60%;
    background: radial-gradient(ellipse, rgba(71,255,232,0.05) 0%, transparent 65%);
    animation: driftB 10s ease-in-out infinite alternate;
  }
  @keyframes driftA { from{transform:translate(0,0)} to{transform:translate(30px,20px)} }
  @keyframes driftB { from{transform:translate(0,0)} to{transform:translate(-20px,30px)} }

  .dot-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: radial-gradient(circle, rgba(184,164,255,0.1) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  /* Page */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
    gap: 0;
  }

  /* Card */
  .card {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(184,164,255,0.06),
      0 40px 100px rgba(0,0,0,0.7),
      0 8px 32px rgba(0,0,0,0.4);
    animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(32px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--purple) 0%, var(--cyan) 100%);
  }

  /* Hero */
  .hero {
    padding: 36px 32px 28px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }

  .hero-bg {
    position: absolute; top: 0; right: 0;
    width: 160px; height: 160px;
    opacity: 0.04; pointer-events: none;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(184,164,255,0.08);
    border: 0.5px solid rgba(184,164,255,0.25);
    border-radius: 20px; padding: 4px 12px;
    font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--purple); margin-bottom: 18px;
    animation: cardIn 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    animation: blink 1.8s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .company-name {
    font-family: 'Syne', sans-serif;
    font-size: 34px; font-weight: 800;
    color: var(--white); letter-spacing: -0.04em; line-height: 1;
    animation: cardIn 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }
  .company-name span { color: var(--purple); }

  .tagline {
    font-size: 9px; color: var(--purple);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-top: 6px;
    animation: cardIn 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .divider {
    width: 32px; height: 2px;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    border-radius: 2px; margin: 14px 0;
    animation: cardIn 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
  }

  .person-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--white); letter-spacing: 0.01em;
    animation: cardIn 0.6s 0.28s cubic-bezier(0.22,1,0.36,1) both;
  }

  .person-role {
    font-size: 9px; color: var(--dim);
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px;
    animation: cardIn 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Contacts */
  .contacts {
    padding: 20px 32px;
    display: flex; flex-direction: column; gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .contact-row {
    display: flex; align-items: center; gap: 8px;
  }

  /* Clickable contact item */
  .contact-item {
    flex: 1;
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--white);
    transition: all 0.2s ease;
    cursor: pointer;
    animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  .contact-item:nth-child(1) { animation-delay: 0.32s; }

  .contact-item:hover {
    background: rgba(184,164,255,0.06);
    border-color: rgba(184,164,255,0.3);
    transform: translateX(3px);
  }

  .contact-icon {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--icon-bg);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { width: 16px; height: 16px; }

  .contact-info { flex: 1; min-width: 0; }

  .contact-label {
    font-size: 9px; color: var(--dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  .contact-value {
    font-size: 13px; color: var(--white); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Copy button */
  .copy-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--icon-bg);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: all 0.18s ease;
    color: var(--dim);
    position: relative;
  }

  .copy-btn:hover {
    background: rgba(184,164,255,0.1);
    border-color: rgba(184,164,255,0.4);
    color: var(--purple);
  }

  .copy-btn.copied {
    background: rgba(71,255,232,0.1);
    border-color: rgba(71,255,232,0.4);
    color: var(--cyan);
  }

  .copy-btn svg { width: 14px; height: 14px; }

  /* Tooltip */
  .copy-btn .tooltip {
    position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
    font-size: 9px; color: var(--cyan); white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
  }

  .copy-btn.copied .tooltip { opacity: 1; }

  /* WhatsApp section */
  .wa-section {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    animation: cardIn 0.5s 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  .wa-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 15px 24px;
    background: rgba(37,211,102,0.08);
    border: 1px solid rgba(37,211,102,0.3);
    border-radius: 16px;
    text-decoration: none; color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
    cursor: pointer; transition: all 0.22s ease;
    position: relative; overflow: hidden;
  }

  .wa-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(37,211,102,0.06);
    opacity: 0; transition: opacity 0.2s;
  }

  .wa-btn:hover::after { opacity: 1; }

  .wa-btn:hover {
    border-color: rgba(37,211,102,0.55);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(37,211,102,0.14);
  }

  .wa-btn:active { transform: translateY(0); }

  .wa-icon { width: 22px; height: 22px; flex-shrink: 0; }
  .wa-label { color: #25d366; font-weight: 500; }
  .wa-number { font-size: 10px; color: var(--dim); letter-spacing: 0.06em; }

  /* Portfolio */
  .portfolio-section {
    padding: 16px 32px 24px;
    animation: cardIn 0.5s 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }

  .portfolio-link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: rgba(71,255,232,0.04);
    border: 0.5px solid rgba(71,255,232,0.15);
    border-radius: 12px;
    text-decoration: none; color: var(--cyan);
    font-size: 11px; letter-spacing: 0.05em;
    transition: all 0.2s ease;
  }

  .portfolio-link:hover {
    background: rgba(71,255,232,0.08);
    border-color: rgba(71,255,232,0.35);
    transform: translateY(-1px);
  }

  .portfolio-left {
    display: flex; align-items: center; gap: 10px;
  }

  .portfolio-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }

  /* Footer */
  .footer {
    margin-top: 24px;
    font-size: 9px; color: var(--dark-dim);
    letter-spacing: 0.14em; text-transform: uppercase; text-align: center;
    animation: cardIn 0.5s 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @media (max-width: 480px) {
    .hero          { padding: 28px 22px 22px; }
    .contacts      { padding: 16px 22px; }
    .wa-section    { padding: 16px 22px; }
    .portfolio-section { padding: 14px 22px 22px; }
    .company-name  { font-size: 28px; }
    .contact-value { font-size: 12px; }
  }
</style>
</head>

<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 2000);
  });
}
</script>
